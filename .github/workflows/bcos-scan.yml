name: BCOS v2 Scan Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bcos-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run BCOS v2 Scan
        id: bcos
        uses: HuiNeng6/bcos-action@v1
        with:
          tier: 'L1'
          fail-on-unmet: 'false'
      
      - name: Display Results
        run: |
          echo "Trust Score: ${{ steps.bcos.outputs.trust_score }}"
          echo "Cert ID: ${{ steps.bcos.outputs.cert_id }}"
          echo "Tier Met: ${{ steps.bcos.outputs.tier_met }}"